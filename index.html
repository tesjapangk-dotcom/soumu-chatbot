<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEsJapan 総務部アシスタント</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
    background: #f0f4f8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2e6da4 100%);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .header-icon {
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-text h1 { font-size: 16px; font-weight: bold; }
  .header-text p  { font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; opacity: 0.9;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message { display: flex; gap: 10px; max-width: 80%; }
  .message.user  { align-self: flex-end;  flex-direction: row-reverse; }
  .message.bot   { align-self: flex-start; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .message.user .avatar { background: #2e6da4; }
  .message.bot  .avatar { background: #e3f0ff; }
  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .message.user .bubble {
    background: #2e6da4;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .message.bot .bubble {
    background: white;
    color: #333;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .message.bot .bubble.error {
    background: #fff0f0;
    border-left: 3px solid #e53935;
    color: #c62828;
  }
  .faq-image {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: block;
  }
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: #90a4ae;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  .quick-bar {
    padding: 10px 16px;
    background: white;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .quick-bar span { font-size: 11px; color: #888; align-self: center; }
  .quick-btn {
    padding: 5px 12px;
    background: #e3f0ff;
    color: #1a3a5c;
    border: 1px solid #b3d4f5;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-btn:hover { background: #2e6da4; color: white; border-color: #2e6da4; }

  .input-area {
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  textarea {
    flex: 1;
    border: 1.5px solid #d0d7de;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  textarea:focus { border-color: #2e6da4; }
  textarea::placeholder { color: #aaa; }
  .send-btn {
    width: 44px; height: 44px;
    background: #2e6da4;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #1a3a5c; }
  .send-btn:disabled { background: #b0bec5; cursor: not-allowed; }

  .welcome {
    text-align: center;
    padding: 30px 20px;
    color: #546e7a;
  }
  .welcome .icon { font-size: 48px; margin-bottom: 12px; }
  .welcome h2 { font-size: 18px; color: #1a3a5c; margin-bottom: 8px; }
  .welcome p  { font-size: 13px; line-height: 1.8; }

  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-thumb { background: #b0bec5; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🤖</div>
  <div class="header-text">
    <h1>総務部アシスタント</h1>
    <p>備品・申請・施設に関する質問はこちらへ</p>
  </div>
  <div class="status-dot"><div class="dot"></div>稼働中</div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeMsg">
    <div class="icon">💬</div>
    <h2>総務部アシスタントへようこそ！</h2>
    <p>備品の場所・申請方法・会議室予約など<br>
    総務部に関する質問を何でも聞いてください。<br><br>
    下の入力欄に質問をどうぞ！</p>
  </div>
</div>

<div class="quick-bar">
  <span>よく聞かれる質問：</span>
  <button class="quick-btn" onclick="sendQuick('コピー用紙はどこにありますか？')">📦 コピー用紙の場所</button>
  <button class="quick-btn" onclick="sendQuick('会議室の予約方法を教えてください')">📅 会議室予約</button>
  <button class="quick-btn" onclick="sendQuick('交通費精算はどうすればいいですか？')">💴 交通費精算</button>
  <button class="quick-btn" onclick="sendQuick('総務部の連絡先を教えてください')">📞 総務部連絡先</button>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="質問を入力してください（例：名刺を発注したい）"
    rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
// ── Cloudflare Worker の URL（APIキーはここに書かない）──
const WORKER_URL = 'https://tesjapan-claude-proxy.tesjapan-gk.workers.dev';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQnxltNYiyqWvYognZ-TFaxoqsp3MK_ltLtu5sOCJNkXCkPb7_Qcln4_bm2di6w5_zzo8VAKJaF-9vv/pub?gid=1359394388&single=true&output=csv';

// ── 画像マッピング（Q&Aに対応する画像ファイル名）──
// Excelの「画像ファイル名」列に入力した内容を以下に追加してください
const IMAGE_DATA = {};
const IMAGE_MAP = {};

// ── GoogleスプレッドシートからFAQを読み込む ──
const SYSTEM_PROMPT_BASE = 'あなたはテスジャパンの総務部担当アシスタントです。\n以下の「社内FAQ・資料」の内容だけを根拠にして、社員の質問に日本語で答えてください。\n\n【重要なルール】\n- 資料に書いていないことは「資料に記載がないため、総務部（内線：123）にお問い合わせください」と答える\n- 回答は簡潔に、でも必要な情報は漏らさず会える\n- 親しみやすい丁寧な敬語で答える\n\n【社内FAQ・資料】\n';
let SYSTEM_PROMPT = SYSTEM_PROMPT_BASE;

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { inQ = !inQ; }
    else if (line[i] === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += line[i]; }
  }
  result.push(cur);
  return result;
}

(async () => {
  try {
    const r = await fetch(SHEET_URL);
    const csv = await r.text();
    const lines = csv.split('\n').slice(1);
    let faq = '';
    for (const line of lines) {
      if (!line.trim()) continue;
      const parts = parseCSVLine(line);
      if (parts.length >= 2 && parts[0].trim()) {
        faq += 'Q: ' + parts[0].trim() + '\nA: ' + parts[1].trim() + '\n\n';
      }
    }
    SYSTEM_PROMPT = SYSTEM_PROMPT_BASE + faq;
  } catch(e) {
    console.error('FAQ読み込みエラー:', e);
  }
})();


const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const sendBtn   = document.getElementById('sendBtn');

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function sendQuick(text) { userInput.value = text; sendMessage(); }

function appendMessage(role, text, isError = false, imageFile = '') {
  const w = document.getElementById('welcomeMsg');
  if (w) w.remove();
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'user' ? '👤' : '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isError ? ' error' : '');
  bubble.textContent = text;
  if (imageFile) {
    const img = document.createElement('img');
    img.src = IMAGE_DATA[imageFile] || `images/${imageFile}`;
    img.className = 'faq-image';
    img.alt = '参考画像';
    img.onerror = () => img.style.display = 'none';
    bubble.appendChild(img);
  }
  div.appendChild(av);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function appendTyping() {
  const div = document.createElement('div');
  div.className = 'message bot'; div.id = 'typingIndicator';
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(av); div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = ''; userInput.style.height = 'auto';
  sendBtn.disabled = true;
  appendMessage('user', text);
  appendTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: SYSTEM_PROMPT + '\n\n社員からの質問: ' + text
      })
    });

    removeTyping();
    if (!res.ok) {
      appendMessage('bot', `⚠️ エラーが発生しました（${res.status}）。しばらく待ってから再試行してください。`, true);
    } else {
      const data = await res.json();
      const imageFile = Object.keys(IMAGE_MAP).find(q => text.includes(q) || q.includes(text))
        ? IMAGE_MAP[Object.keys(IMAGE_MAP).find(q => text.includes(q) || q.includes(text))]
        : '';
      appendMessage('bot', data.answer || '回答を取得できませんでした。', false, imageFile);
    }
  } catch (err) {
    removeTyping();
    appendMessage('bot', '⚠️ 通信エラーが発生しました。インターネット接続を確認してください。', true);
  }

  sendBtn.disabled = false;
  userInput.focus();
}
</script>
</body>
</html>
