<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEsJapan 総務部アシスタント</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
    background: #f0f4f8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2e6da4 100%);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .header-icon {
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-text h1 { font-size: 16px; font-weight: bold; }
  .header-text p  { font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; opacity: 0.9;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message { display: flex; gap: 10px; max-width: 80%; }
  .message.user  { align-self: flex-end;  flex-direction: row-reverse; }
  .message.bot   { align-self: flex-start; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .message.user .avatar { background: #2e6da4; }
  .message.bot  .avatar { background: #e3f0ff; }
  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .message.user .bubble {
    background: #2e6da4;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .message.bot .bubble {
    background: white;
    color: #333;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .message.bot .bubble.error {
    background: #fff0f0;
    border-left: 3px solid #e53935;
    color: #c62828;
  }
  .faq-image {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: block;
  }
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: #90a4ae;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  .quick-bar {
    padding: 10px 16px;
    background: white;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .quick-bar span { font-size: 11px; color: #888; align-self: center; }
  .quick-btn {
    padding: 5px 12px;
    background: #e3f0ff;
    color: #1a3a5c;
    border: 1px solid #b3d4f5;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-btn:hover { background: #2e6da4; color: white; border-color: #2e6da4; }

  .input-area {
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  textarea {
    flex: 1;
    border: 1.5px solid #d0d7de;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  textarea:focus { border-color: #2e6da4; }
  textarea::placeholder { color: #aaa; }
  .send-btn {
    width: 44px; height: 44px;
    background: #2e6da4;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #1a3a5c; }
  .send-btn:disabled { background: #b0bec5; cursor: not-allowed; }

  .welcome {
    text-align: center;
    padding: 30px 20px;
    color: #546e7a;
  }
  .welcome .icon { font-size: 48px; margin-bottom: 12px; }
  .welcome h2 { font-size: 18px; color: #1a3a5c; margin-bottom: 8px; }
  .welcome p  { font-size: 13px; line-height: 1.8; }

  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-thumb { background: #b0bec5; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🤖</div>
  <div class="header-text">
    <h1>総務部アシスタント</h1>
    <p>備品・申請・施設に関する質問はこちらへ</p>
  </div>
  <div class="status-dot"><div class="dot"></div>稼働中</div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeMsg">
    <div class="icon">💬</div>
    <h2>総務部アシスタントへようこそ！</h2>
    <p>備品の場所・申請方法・会議室予約など<br>
    総務部に関する質問を何でも聞いてください。<br><br>
    下の入力欄に質問をどうぞ！</p>
  </div>
</div>

<div class="quick-bar">
  <span>よく聞かれる質問：</span>
  <button class="quick-btn" onclick="sendQuick('コピー用紙はどこにありますか？')">📦 コピー用紙の場所</button>
  <button class="quick-btn" onclick="sendQuick('会議室の予約方法を教えてください')">📅 会議室予約</button>
  <button class="quick-btn" onclick="sendQuick('交通費精算はどうすればいいですか？')">💴 交通費精算</button>
  <button class="quick-btn" onclick="sendQuick('総務部の連絡先を教えてください')">📞 総務部連絡先</button>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="質問を入力してください（例：名刺を発注したい）"
    rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>

'copypaper.jpg': 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iMjAwIj48cmVjdCB3aWR0aD0iNDAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iI0U4QTgzOCIvPjxyZWN0IHg9IjEwIiB5PSIxMCIgd2lkdGg9IjM4MCIgaGVpZ2h0PSIxODAiIGZpbGw9Im5vbmUiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iNCIvPjx0ZXh0IHg9IjIwMCIgeT0iOTAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IndoaXRlIiBmb250LXNpemU9IjI0IiBmb250LWZhbWlseT0iQXJpYWwiPuOCs+ODlOODvOeUqOe0mTwvdGV4dD48dGV4dCB4PSIyMDAiIHk9IjEyNSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0id2hpdGUiIGZvbnQtc2l6ZT0iMTYiIGZvbnQtZmFtaWx5PSJBcmlhbCI+44K544OI44OD44Kr44O8PC90ZXh0Pjwvc3ZnPg==',
  'soumu.jpg': 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iMjAwIj48cmVjdCB3aWR0aD0iNDAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iIzlCNTlCNiIvPjxyZWN0IHg9IjEwIiB5PSIxMCIgd2lkdGg9IjM4MCIgaGVpZ2h0PSIxODAiIGZpbGw9Im5vbmUiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iNCIvPjx0ZXh0IHg9IjIwMCIgeT0iOTAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IndoaXRlIiBmb250LXNpemU9IjI0IiBmb250LWZhbWlseT0iQXJpYWwiPu總5213iemUjjwvdGV4dD48dGV4dCB4PSIyMDAiIHk9IjEyNSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0id2hpdGUiIGZvbnQtc2l6ZT0iMTYiIGZvbnQtZmFtaWx5PSJBcmlhbCI+MumipDwvdGV4dD48L3N2Zz4=',
};
const IMAGE_MAP = {
  'ボールペン': 'bippinndana.jpg',
  '付箋': 'bippinndana.jpg',
  '封筒': 'bippinndana.jpg',
  'コピー用紙': 'copypaper.jpg',
  '会議室': 'kaigishitsu.jpg',
  '貸出PC': 'kaigishitsu.jpg',
  '総務部の連絡先': 'soumu.jpg',
  '総務部に連絡': 'soumu.jpg',
};

// ── 総務部 FAQ データ ──
const FAQ_DATA = `
=== TEsJapan 総務部 社内FAQ ===

【備品・消耗品】
Q: ボールペンはどこにありますか？
A: 2階総務部横の備品棚（キャビネットB）の上段にあります。黒・赤・青の3色を常備しています。なくなっていた場合は総務部（内線123）までご連絡ください。

Q: コピー用紙はどこにありますか？
A: 各フロアのコピー機横のストッカーに補充用があります。在庫が少なくなったら総務部へご連絡ください。

Q: 付箋・ホチキス針・クリップはどこですか？
A: 2階総務部横の備品棚（キャビネットB）中段にあります。

Q: 封筒はどこにありますか？
A: 2階総務部横の備品棚（キャビネットA）下段に、社用封筒（角2・長3）を常備しています。

【貸出機器】
Q: 会議用の貸出PCの借り方を教えてください
A: 総務部に事前予約が必要です。Teamsの「総務部」チャネルに「貸出PC予約」と投稿し、使用日・時間・用途を記載。当日2階総務部窓口で受取（社員証確認あり）。返却は使用当日中。

Q: プロジェクターを借りたい
A: 総務部にて貸出対応しています。Teamsの総務部チャネルから予約してください。HDMI・VGA両対応のモデルです。

Q: ポケットWi-Fiを借りたい
A: 出張用のポケットWi-Fiは総務部で3台管理しています。出張申請時に合わせて総務部へご連絡ください。なお、6Fのパスワードは〇〇〇〇、7Fのパスワードは△△△△です。詳細は総務部（内線：120）までお問い合わせください。

【会議室】
Q: 会議室を予約したい
A: Outlookの予定表から会議室リソース（2F-大会議室、2F-小会議室A、3F-打合せスペース）を選択して予約してください。当日の空室は総務部内線123で確認できます。

Q: 会議室でお茶を出したい
A: 来客用のペットボトル茶・コーヒーは2階総務部横の給湯室に用意しています。自由にお使いください。

【各種申請】
Q: 交通費精算の方法を教えてください
A: 月末までに経費精算システム（SAP Concur）から申請してください。領収書は写真添付で可。5,000円を超える場合は原本を総務部に提出してください。

Q: 名刺を発注したい
A: 総務部指定のフォーム（SharePoint「総務申請」サイト内）から申請してください。発注から受取まで約5営業日です。

Q: 出張申請の方法を教えてください
A: SharePoint「総務申請」サイト内の「出張申請書」を提出してください。承認後、交通・宿泊の手配は各自で行い、精算は経費精算システムから行います。

Q: 慶弔金の申請方法を教えてください
A: 総務部までメール（soumu@tesjapan.co.jp）でご連絡ください。申請書をお送りします。

【施設・入退館】
Q: 社員証を紛失しました
A: すぐに総務部（内線123）にご連絡ください。再発行には申請書の提出が必要で、発行まで約3営業日かかります。

Q: 駐車場を使いたい
A: 来客用駐車場は3台分あります。事前に総務部へ予約してください。社員用駐車場は契約制です。

【連絡先】
Q: 総務部の連絡先を教えてください
A: 内線：123　メール：soumu@tesjapan.co.jp　窓口：2階 総務部　受付時間：平日 9:00〜17:30

Q: 緊急時の連絡先を教えてください
A: 業務時間外の施設トラブル等は、警備室（内線999）までご連絡ください。
`;

const SYSTEM_PROMPT = 'あなたはテスジャパンの総務部担当アシスタントです。\n以下の「社内FAQ・資料」の内容だけを根拠にして、社員の質問に日本語で答えてください。\n\n【重要なルール】\n- 資料に書いていないことは「資料に記載がないため、総務部（内線：120）にお問い合わせください」と答える\n- 回答は簡潔に、でも必要な情報は漏らさず会える\n- 親しみやすい丁寧な敬語で答える\n\n【社内FAQ・資料】\n' + FAQ_DATA;
const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const sendBtn   = document.getElementById('sendBtn');

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function sendQuick(text) { userInput.value = text; sendMessage(); }

function appendMessage(role, text, isError = false, imageFile = '') {
  const w = document.getElementById('welcomeMsg');
  if (w) w.remove();
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'user' ? '👤' : '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isError ? ' error' : '');
  bubble.textContent = text;
  if (imageFile) {
    const img = document.createElement('img');
    img.src = IMAGE_DATA[imageFile] || `images/${imageFile}`;
    img.className = 'faq-image';
    img.alt = '参考画像';
    img.onerror = () => img.style.display = 'none';
    bubble.appendChild(img);
  }
  div.appendChild(av);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function appendTyping() {
  const div = document.createElement('div');
  div.className = 'message bot'; div.id = 'typingIndicator';
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(av); div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = ''; userInput.style.height = 'auto';
  sendBtn.disabled = true;
  appendMessage('user', text);
  appendTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: SYSTEM_PROMPT + '\n\n社員からの質問: ' + text
      })
    });

    removeTyping();
    if (!res.ok) {
      appendMessage('bot', `⚠️ エラーが発生しました（${res.status}）。しばらく待ってから再試行してください。`, true);
    } else {
      const data = await res.json();
      const imageFile = Object.keys(IMAGE_MAP).find(q => text.includes(q) || q.includes(text))
        ? IMAGE_MAP[Object.keys(IMAGE_MAP).find(q => text.includes(q) || q.includes(text))]
        : '';
      appendMessage('bot', data.answer || '回答を取得できませんでした。', false, imageFile);
    }
  } catch (err) {
    removeTyping();
    appendMessage('bot', '⚠️ 通信エラーが発生しました。インターネット接続を確認してください。', true);
  }

  sendBtn.disabled = false;
  userInput.focus();
}
</script>
</body>
</html>
